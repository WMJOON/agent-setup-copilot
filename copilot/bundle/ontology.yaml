# agent-setup-copilot — bundle ontology (snapshot)
# Sections: use_cases / devices / models / frameworks / api_services
# Full ontology (components, repos, setup_profiles):
# → https://github.com/WMJOON/agent-setup-ontology
version: "0.1.0"

use_cases:

  - id: web_automation
    label: "웹 자동화"
    description: "브라우저 조작, 스크래핑, 폼 자동화"
    keywords: [OpenClaw, 브라우저, 크롤링, 자동화, 웹, 스크래핑]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:35b-a3b]
    recommended_frameworks: [openclaw, smolagents]

  - id: file_automation
    label: "파일·시스템 자동화"
    description: "파일 정리, 변환, 백업 스크립트"
    keywords: [파일, 정리, 변환, 백업, 스크립트, 자동화]
    min_memory_gb: 8
    needs_always_on: false
    recommended_models: [qwen3.5:4b, qwen3.5:9b]
    recommended_frameworks: [smolagents, qwen-agent]

  - id: code_generation
    label: "코드 생성·보조"
    description: "함수·클래스 작성, 보일러플레이트, 테스트 코드"
    keywords: [코드, 개발, 프로그래밍, 함수, 클래스, 코딩]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:14b, qwen3.5:35b-a3b]
    recommended_frameworks: [smolagents, qwen-agent, continue]

  - id: code_review
    label: "코드 리뷰·리팩토링"
    description: "PR 리뷰, 버그 탐지, 개선 제안"
    keywords: [리뷰, 리팩토링, 버그, 개선, PR]
    min_memory_gb: 32
    needs_always_on: false
    recommended_models: [qwen3.5:27b, qwen3.5:35b-a3b]
    recommended_frameworks: [smolagents, qwen-agent]

  - id: local_copilot
    label: "로컬 코파일럿 (IDE)"
    description: "IDE 인라인 자동완성 및 제안"
    keywords: [코파일럿, 자동완성, Continue, IDE, VSCode]
    min_memory_gb: 8
    needs_always_on: true
    recommended_models: [qwen3.5:4b, qwen3.5:9b]
    recommended_frameworks: [continue]

  - id: web_research
    label: "웹 리서치·요약"
    description: "검색, 트렌드 분석, 뉴스 요약"
    keywords: [검색, 리서치, 조사, 트렌드, 뉴스, 요약]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:14b]
    recommended_frameworks: [smolagents, qwen-agent]

  - id: document_rag
    label: "문서 RAG"
    description: "PDF·문서 기반 질문 응답"
    keywords: [PDF, 문서, RAG, 질문, 요약, 파일]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:14b, qwen3.5:27b]
    recommended_frameworks: [qwen-agent, llamaindex]

  - id: general_qa
    label: "일반 Q&A 챗봇"
    description: "ChatGPT 대체 로컬 대화 AI"
    keywords: [챗봇, 질문, 대화, ChatGPT, 대체, 비서]
    min_memory_gb: 8
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:14b]
    recommended_frameworks: [open-webui]

  - id: multi_agent
    label: "멀티에이전트 파이프라인"
    description: "여러 Agent가 협업하는 워크플로우"
    keywords: [멀티에이전트, CrewAI, 파이프라인, 오케스트레이션, 협업]
    min_memory_gb: 32
    needs_always_on: false
    recommended_models: [qwen3.5:27b, qwen3.5:35b-a3b]
    recommended_frameworks: [crewai, langgraph]

  - id: agent_monitoring
    label: "에이전트 평가·모니터링"
    description: "LLM-as-Judge, trace 분석, 품질 평가"
    keywords: [모니터링, 평가, judge, trace, 품질, 분석]
    min_memory_gb: 32
    needs_always_on: false
    recommended_models: [qwen3.5:27b, qwen3.5:35b-a3b]
    recommended_frameworks: [smolagents, langgraph]

  - id: fine_tuning
    label: "파인튜닝·LoRA"
    description: "로컬 모델 커스터마이징"
    keywords: [파인튜닝, LoRA, QLoRA, 학습, 훈련, 파인튜닝]
    min_memory_gb: 32
    requires_gpu: true
    recommended_models: [qwen3.5:9b, qwen3.5:14b]
    recommended_frameworks: []

