# ──────────────────────────────────────────────────────────
# 모델
# ──────────────────────────────────────────────────────────
models:

  - id: qwen3.5:4b
    label: "qwen3.5:4b"
    params_b: 4
    type: dense
    min_memory_gb: 8
    quality: light
    tool_calling: true
    speed_note: "CPU에서도 동작. ~15-25 t/s (M-series)"

  - id: qwen3.5:9b
    label: "qwen3.5:9b"
    params_b: 9
    type: dense
    min_memory_gb: 16
    quality: standard
    tool_calling: true
    speed_note: "~20-35 t/s (M-series 16GB)"
    sweet_spot: true
    note: "개인 사용 가성비 최강. 16GB 기기의 기본 선택"

  - id: qwen3.5:14b
    label: "qwen3.5:14b"
    params_b: 14
    type: dense
    min_memory_gb: 16
    quality: standard-plus
    tool_calling: true
    speed_note: "~14-20 t/s (M-series 16GB)"

  - id: qwen3.5:35b-a3b
    label: "qwen3.5:35b-a3b"
    params_b: 35
    active_params_b: 3
    type: MoE
    min_memory_gb: 32
    quality: pro
    tool_calling: true
    speed_note: "~18-25 t/s (M4 base 32GB)"
    sweet_spot: true
    note: "MoE — 35B 품질, 실제 3B 활성화. 32GB 기기 베스트픽"

  - id: qwen3.5:27b
    label: "qwen3.5:27b"
    params_b: 27
    type: dense
    min_memory_gb: 32
    quality: pro
    tool_calling: true
    speed_note: "~10-15 t/s (M4 base 32GB)"
    note: "dense 최고 단일 모델. 대역폭 의존도 높음"

  - id: qwen3.5:32b
    label: "qwen3.5:32b"
    params_b: 32
    type: dense
    min_memory_gb: 32
    quality: pro
    tool_calling: true
    speed_note: "~7-10 t/s (M4 base 32GB)"

  - id: qwen3.5:72b
    label: "qwen3.5:72b"
    params_b: 72
    type: dense
    min_memory_gb: 64
    quality: pro
    tool_calling: true
    speed_note: "~12-15 t/s (Mac Studio M4 Max 128GB / DGX Spark)"
    note: "Highest quality open-weight model. Requires 64GB+ unified memory or 48GB VRAM."

# ──────────────────────────────────────────────────────────
# Frameworks
# ──────────────────────────────────────────────────────────
frameworks:

  # ── Agent Frameworks ───────────────────────────────────

  - id: smolagents
    label: "smolagents (HuggingFace)"
    kind: agent
    complexity: low
    local_capable: true
    runtime_support: [ollama, huggingface, litellm, openai, anthropic]
    multiagent: true
    mcp_support: false
    install: "pip install smolagents[ollama]"
    best_for: [web_automation, file_automation, web_research, schedule_task]
    note: "Lowest barrier to entry. Agent running in 5 lines. Code-execution approach."

  - id: qwen-agent
    label: "Qwen-Agent"
    kind: agent
    complexity: low
    local_capable: true
    runtime_support: [ollama, openai, any]
    multiagent: true
    mcp_support: true
    install: "pip install qwen-agent"
    best_for: [web_automation, code_generation, document_rag, agent_monitoring]
    note: "Optimized for Qwen models. Native MCP protocol support."

  - id: crewai
    label: "CrewAI"
    kind: agent
    complexity: medium
    local_capable: true
    runtime_support: [ollama, openai, anthropic, any]
    multiagent: true
    mcp_support: false
    install: "pip install crewai"
    best_for: [multi_agent, deep_research, code_review]
    note: "Role-based multi-agent orchestration. Best for collaborative pipelines."

  - id: langgraph
    label: "LangGraph"
    kind: agent
    complexity: high
    local_capable: true
    runtime_support: [ollama, openai, anthropic, huggingface, any]
    multiagent: true
    mcp_support: false
    install: "pip install langgraph langchain-community"
    best_for: [multi_agent, agent_monitoring]
    note: "Graph-based stateful workflows. Most flexible, steepest learning curve."

  # ── Automation Frameworks ──────────────────────────────

  - id: openclaw
    label: "OpenClaw"
    kind: automation
    complexity: medium
    local_capable: true
    runtime_support: [ollama, openai, anthropic]
    multiagent: false
    mcp_support: false
    install: "https://github.com/openclaw/openclaw"
    best_for: [web_automation]
    note: "Autonomous browser, file, and code execution. LLM wrapper for desktop automation."

  # ── UI Front-ends ──────────────────────────────────────

  - id: open-webui
    label: "Open WebUI"
    kind: ui
    complexity: low
    local_capable: true
    runtime_support: [ollama, openai]
    multiagent: false
    mcp_support: false
    install: "docker run -d -p 3000:8080 ghcr.io/open-webui/open-webui"
    best_for: [general_qa, writing_assistant]
    note: "ChatGPT-like web UI for Ollama. No coding required."

  - id: anythingllm
    label: "AnythingLLM"
    kind: ui
    complexity: low
    local_capable: true
    runtime_support: [ollama, openai, anthropic, any]
    multiagent: false
    mcp_support: false
    install: "https://anythingllm.com/download"
    best_for: [general_qa, document_rag]
    note: "Desktop app with built-in RAG. Good for non-technical users."

  # ── IDE Extensions ─────────────────────────────────────

  - id: continue
    label: "Continue (VSCode / JetBrains)"
    kind: ide
    complexity: low
    local_capable: true
    runtime_support: [ollama, openai, anthropic, any]
    multiagent: false
    mcp_support: false
    install: "VSCode Marketplace: Continue"
    best_for: [local_copilot, code_generation]
    note: "Inline code copilot. Drop-in replacement for GitHub Copilot."

  # ── RAG Frameworks ─────────────────────────────────────

  - id: llamaindex
    label: "LlamaIndex"
    kind: rag
    complexity: medium
    local_capable: true
    runtime_support: [ollama, openai, anthropic, huggingface, any]
    multiagent: false
    mcp_support: false
    install: "pip install llama-index llama-index-llms-ollama"
    best_for: [document_rag, deep_research]
    note: "Production-grade RAG. Best for large document collections."

# ──────────────────────────────────────────────────────────
# API Services
# Cloud LLM APIs as an alternative or starting point before
# committing to local hardware. Pricing is approximate —
# always verify at the provider's official pricing page.
# ──────────────────────────────────────────────────────────
api_services:

  # ── Anthropic ──────────────────────────────────────────

  - id: claude-haiku-4-5
    label: "Claude Haiku 4.5"
    provider: anthropic
    quality: standard
    tool_calling: true
    context_window_k: 200
    pricing:
      input_per_1m: 0.80
      output_per_1m: 4.00
      currency: USD
      source: "https://www.anthropic.com/pricing"
    local_alternative: "qwen3.5:9b"
    note: "Fastest Anthropic model. Best cost-per-task for simple agents."

  - id: claude-sonnet-4-6
    label: "Claude Sonnet 4.6"
    provider: anthropic
    quality: pro
    tool_calling: true
    context_window_k: 200
    pricing:
      input_per_1m: 3.00
      output_per_1m: 15.00
      currency: USD
      source: "https://www.anthropic.com/pricing"
    local_alternative: "qwen3.5:27b"
    note: "High-quality reasoning. Good for complex agent tasks and code review."

  # ── OpenAI ─────────────────────────────────────────────

  - id: gpt-4o-mini
    label: "GPT-4o mini"
    provider: openai
    quality: standard
    tool_calling: true
    context_window_k: 128
    pricing:
      input_per_1m: 0.15
      output_per_1m: 0.60
      currency: USD
      source: "https://openai.com/pricing"
    local_alternative: "qwen3.5:9b"
    note: "Cheapest capable OpenAI model. Good entry point for API-first workflows."

  - id: gpt-4o
    label: "GPT-4o"
    provider: openai
    quality: pro
    tool_calling: true
    context_window_k: 128
    pricing:
      input_per_1m: 2.50
      output_per_1m: 10.00
      currency: USD
      source: "https://openai.com/pricing"
    local_alternative: "qwen3.5:27b"
    note: "Strong all-rounder. High cost at scale."

  # ── Google ─────────────────────────────────────────────

  - id: gemini-2-flash
    label: "Gemini 2.0 Flash"
    provider: google
    quality: standard
    tool_calling: true
    context_window_k: 1000
    pricing:
      input_per_1m: 0.10
      output_per_1m: 0.40
      currency: USD
      source: "https://ai.google.dev/pricing"
    local_alternative: "qwen3.5:9b"
    note: "Cheapest capable model with 1M context. Good for long-document tasks."

  - id: gemini-2-pro
    label: "Gemini 2.0 Pro"
    provider: google
    quality: pro
    tool_calling: true
    context_window_k: 1000
    pricing:
      input_per_1m: 1.25
      output_per_1m: 5.00
      currency: USD
      source: "https://ai.google.dev/pricing"
    local_alternative: "qwen3.5:27b"
    note: "High quality with massive context window."

# ──────────────────────────────────────────────────────────
