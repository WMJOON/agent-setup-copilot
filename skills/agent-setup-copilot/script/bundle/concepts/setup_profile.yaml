# agent-setup-ontology — Setup Profile concept definitions (bundle snapshot)
# Full SOT: https://github.com/WMJOON/agent-setup-ontology

version: "0.1.0"

setup_profile:
  what: >
    Curated device + model + framework combinations that form a complete,
    tested local AI agent setup. Profiles are matched to user roles and
    budgets to provide turnkey recommendations.

  fields:
    roles:
      description: >
        Target user roles or personas this profile serves
        (e.g., developer, researcher, home-automation enthusiast).
    complexity:
      description: >
        Overall setup complexity (low, medium, high). Accounts for OS config,
        model downloads, framework installation, and integration work.
    monthly_cost:
      description: >
        Estimated ongoing monthly cost (electricity, optional cloud fallback).
        Excludes one-time hardware purchase.
    setup_steps:
      description: >
        Ordered list of high-level steps to go from unboxing to a working
        local agent stack.
