# Golden Cases for Recommendation Eval
# Phase G — recommendation_eval.py 입력 데이터
#
# 각 케이스: PROPOSE 단계 입력 → 기대 출력 정의
# 전문가 판단 기반으로 작성. 새 케이스 추가 시 이 파일만 수정.
#
# 구조:
#   id: 케이스 ID (snake_case)
#   description: 케이스 설명
#   input: PROPOSE 단계 슬롯 (goal, constraint, tech_level, deployment_target)
#   expected:
#     top_models: 추천 모델 중 하나 이상이 포함되어야 함 (any-of)
#     top_frameworks: 추천 프레임워크 중 하나 이상 포함 (any-of)
#     must_exclude_models: 이 모델들은 추천에 없어야 함
#     must_include_rationale: 추천 이유에 반드시 포함될 개념 (키워드)
#   weight: 케이스 중요도 (1–3)
#   tags: 분류 태그

golden_cases:

  - id: gc_001
    description: "Mac mini M4 32GB + web_automation + always_on"
    weight: 3
    tags: [local, mac, web_automation, beginner]
    input:
      goal: web_automation
      constraint:
        device: mac_mini_m4_32gb
        hard: [always_on]
        soft: [prefer_simple_setup]
      tech_level: beginner
      deployment_target: local
    expected:
      top_models:
        - qwen3.5:35b-a3b    # MoE 32GB sweet spot
        - qwen3.5:27b         # dense alternative
      top_frameworks:
        - openclaw
        - smolagents
      must_exclude_models:
        # 32GB 초과 모델은 제외되어야 함
        - qwen3.5:72b
        - llama4:109b
      must_include_rationale:
        - always_on            # 상시 운영 조건 언급
        - web_automation       # use_case 언급

  - id: gc_002
    description: "MacBook 16GB + code generation + portable + no always_on"
    weight: 2
    tags: [local, mac, code_generation, portable]
    input:
      goal: code_generation
      constraint:
        device: macbook_16gb
        hard: []
        soft: [portable, prefer_fast_response]
      tech_level: intermediate
      deployment_target: local
    expected:
      top_models:
        - qwen3.5:9b          # 16GB sweet spot
        - qwen3.5:4b          # lighter fallback
      must_exclude_models:
        - qwen3.5:27b          # 16GB에서 메모리 초과
        - qwen3.5:35b-a3b      # 32GB 필요
        - qwen3.5:72b
      must_include_rationale:
        - code_generation
        - memory               # 메모리 제약 언급

  - id: gc_003
    description: "API → local 전환 검토 (Optimizer: API 비용 절감)"
    weight: 3
    tags: [transition, optimizer, cost]
    input:
      goal: coding_assistant
      constraint:
        monthly_cost_usd: 150
        hard: []
        soft: [cost_reduction]
      tech_level: intermediate
      deployment_target: undecided
    expected:
      top_models:
        - qwen3.5:14b
        - qwen3.5:9b
      must_include_rationale:
        - break_even           # 전환 시점 언급
        - cost                 # 비용 관련 언급
        - local                # 로컬 전환 언급

  - id: gc_004
    description: "Docker 없이 + 팀 확장 불필요 + privacy 중요"
    weight: 2
    tags: [negative_constraint, privacy, deo]
    input:
      goal: document_rag
      constraint:
        device: mac_mini_m4_32gb
        hard: [no_docker, privacy]
        soft: []
        negative: [docker]
      tech_level: intermediate
      deployment_target: local
    expected:
      top_models:
        - qwen3.5:35b-a3b
        - qwen3.5:14b
      must_exclude_rationale:
        - docker               # docker 경로는 제외됨을 명시
      must_include_rationale:
        - privacy              # 프라이버시 조건 언급
        - no_docker            # 도커 없이 가능한 스택

  - id: gc_005
    description: "Mini PC + OCuLink GPU (RTX 3090) + local inference"
    weight: 2
    tags: [local, pc, gpu, oculink, builder]
    input:
      goal: agent_monitoring
      constraint:
        device: minipc_oculink_rtx3090
        hard: [always_on]
        soft: [high_performance]
      tech_level: advanced
      deployment_target: local
    expected:
      top_models:
        - qwen3.5:72b          # 24GB VRAM에서 가능
        - qwen3.5:35b-a3b
      must_include_rationale:
        - vram                 # GPU VRAM 언급
        - oculink              # 또는 GPU acceleration 언급
